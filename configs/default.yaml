# Default configuration for Video Text Translator
# CLI arguments override values in this file.
# See README.md for parameter explanations.

input_path: ""           # required (set via --input)
output_path: ""          # required (set via --output)
compute_mode: cpu        # cpu | gpu

detector:
  confidence_threshold: 0.5   # [0.0, 1.0]
  batch_size: 4               # [1, 32]
  model_variant: mobile       # mobile (fast, default) | server (accurate, ~5-10x slower on CPU)
  cpu_threads: 0              # 0 = auto (use all logical cores)

tracker:
  iou_threshold: 0.5                  # [0.0, 1.0]
  content_similarity_threshold: 0.7   # [0.0, 1.0]
  center_distance_ratio: 0.10         # (0.0, 1.0]  fraction of frame diagonal
  n_inactive: 3                       # [1, 30]
  max_active_segments: 100            # [1, 1000]

inpainter:
  algorithm: telea         # telea | ns
  radius: 3                # [1, 20]
  padding: 4               # [0, 20]

translator:
  backend: llm             # google | llm  (llm dùng OpenAI-compatible API qua 9Router/OpenRouter)
  timeout_seconds: 10.0    # (0, 60]
  max_chars: 5000          # [1, 10000]
  max_retries: 3           # [0, 10]
  llm:
    enabled: true
    # --- Cấu hình LLM API (OpenAI-compatible endpoint) ---
    #
    # base_url: URL của proxy/API endpoint (BẮT BUỘC)
    #   - 9Router local:  "http://localhost:20128/v1"
    #   - OpenRouter:     "https://openrouter.ai/api/v1"
    #   - Bất kỳ proxy OpenAI-compatible nào khác
    #
    # model: tên model hoặc tên combo trên proxy
    #   - 9Router: tên combo bạn đặt trong dashboard (ví dụ: "free", "fast", v.v.)
    #   - OpenRouter: "google/gemini-2.5-flash-lite", "anthropic/claude-3-haiku", v.v.
    #
    # api_key_env: tên biến môi trường chứa API key (đọc từ file .env)
    #   - 9Router: có thể dùng key bất kỳ (ví dụ: "sk-anything")
    #   - OpenRouter: key từ openrouter.ai
    #
    # Khi LLM API thất bại → tự động fallback sang Google Translate (miễn phí, không cần key)
    #
    base_url: "http://localhost:20128/v1"
    model: free
    api_key_env: LLM_API_KEY
    max_chars_target: 0    # 0 = không giới hạn độ dài bản dịch
    rpm: 15                # giới hạn request/phút (tùy proxy, 9Router thường không giới hạn)
    timeout_seconds: 30.0
    batch_size: 10         # [1, 20] — số lượng text gộp trong 1 lần gọi API (tiết kiệm request)

renderer:
  font_path: fonts/NotoSans-Regular.ttf
  font_size_max: 64        # [8, 512]
  font_size_min: 20        # [6, font_size_max]
  text_rgb: [255, 255, 0]

  # Viền text (stroke) - bật/tắt + màu + độ dày
  stroke_enabled: true
  stroke_rgb: [0, 0, 0]
  stroke_width: 2          # [0, 20]

  # Background phía sau text - bật/tắt + màu + độ mờ
  background_enabled: false
  background_rgb: [255, 255, 0]
  background_alpha: 128    # [0, 255]; 255 = đặc, 0 = trong suốt

  # Đổ bóng - bật/tắt + màu + độ lệch
  shadow_enabled: false
  shadow_rgb: [0, 0, 0]
  shadow_offset: [2, 2]    # each in [-50, 50]

  # Cascade fallback khi text Việt dài hơn box gốc.
  # Thứ tự áp dụng: 1) expand bbox -> 2) word wrap -> 3) condensed font.
  overflow:
    expand_bbox_enabled: true
    expand_bbox_max: 1.2             # [1.0, 4.0] - mở rộng box tối đa N lần
    word_wrap_enabled: true
    word_wrap_max_lines: 3           # [1, 10]
    condensed_enabled: true
    condensed_font_path: fonts/NotoSans-Condensed.ttf

performance:
  ocr_stride: 10                        # [1, 10]
  ocr_downscale: 1.5                   # [1.0, 4.0]
  io_buffer_frames: 8
  max_duration_seconds: 7200           # 2 hours
  max_file_size_bytes: 5368709120      # 5 GB

# Default configuration for Video Text Translator
# CLI arguments override values in this file.
# See README.md for parameter explanations.

input_path: ""           # required (set via --input)
output_path: ""          # required (set via --output)
compute_mode: cpu        # cpu | gpu

detector:
  confidence_threshold: 0.5   # [0.0, 1.0]
  batch_size: 4               # [1, 32]
  model_variant: mobile       # mobile (fast, default) | server (accurate, ~5-10x slower on CPU)
  cpu_threads: 0              # 0 = auto (use all logical cores)

tracker:
  iou_threshold: 0.5                  # [0.0, 1.0]
  content_similarity_threshold: 0.7   # [0.0, 1.0]
  center_distance_ratio: 0.10         # (0.0, 1.0]  fraction of frame diagonal
  n_inactive: 3                       # [1, 30]
  max_active_segments: 100            # [1, 1000]

inpainter:
  algorithm: telea         # telea | ns
  radius: 3                # [1, 20]
  padding: 4               # [0, 20]

translator:
  backend: gemini          # google | gemini  (gemini requires GEMINI_API_KEY env var)
  timeout_seconds: 10.0    # (0, 60]
  max_chars: 5000          # [1, 10000]
  max_retries: 3           # [0, 10]
  gemini:
    enabled: true         # true to switch backend to gemini (alternative to setting backend: gemini)
    model: gemini-2.5-flash-lite
    api_key_env: GEMINI_API_KEY
    max_chars_target: 0    # 0 = no length cap; otherwise prompt asks the model to stay <= this many chars
    rpm: 15                # free-tier quota for Flash-Lite
    timeout_seconds: 30.0
    batch_size: 10         # [1, 20] — number of texts per batch API call

renderer:
  font_path: fonts/NotoSans-Regular.ttf
  font_size_max: 64        # [8, 512]
  font_size_min: 16        # [6, font_size_max]
  text_rgb: [255, 255, 0]

  # Viền text (stroke) - bật/tắt + màu + độ dày
  stroke_enabled: true
  stroke_rgb: [0, 0, 0]
  stroke_width: 2          # [0, 20]

  # Background phía sau text - bật/tắt + màu + độ mờ
  background_enabled: false
  background_rgb: [255, 255, 0]
  background_alpha: 128    # [0, 255]; 255 = đặc, 0 = trong suốt

  # Đổ bóng - bật/tắt + màu + độ lệch
  shadow_enabled: false
  shadow_rgb: [0, 0, 0]
  shadow_offset: [2, 2]    # each in [-50, 50]

  # Cascade fallback khi text Việt dài hơn box gốc.
  # Thứ tự áp dụng: 1) expand bbox -> 2) word wrap -> 3) condensed font.
  overflow:
    expand_bbox_enabled: true
    expand_bbox_max: 1.5             # [1.0, 4.0] - mở rộng box tối đa N lần
    word_wrap_enabled: true
    word_wrap_max_lines: 3           # [1, 10]
    condensed_enabled: true
    condensed_font_path: fonts/NotoSans-Condensed.ttf

performance:
  ocr_stride: 2                        # [1, 10]
  ocr_downscale: 1.5                   # [1.0, 4.0]
  io_buffer_frames: 8
  max_duration_seconds: 7200           # 2 hours
  max_file_size_bytes: 5368709120      # 5 GB

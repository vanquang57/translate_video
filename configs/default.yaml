# ============================================================================
# Cấu hình mặc định cho Video Text Translator
# Tham số dòng lệnh (CLI) sẽ ghi đè giá trị trong file này.
# ============================================================================

input_path: ""           # (bắt buộc) đường dẫn video đầu vào — đặt qua --input
output_path: ""          # (bắt buộc) đường dẫn video đầu ra — đặt qua --output
compute_mode: cpu        # chế độ tính toán: cpu | gpu

# ============================================================================
# Nhận diện text (OCR)
# ============================================================================
detector:
  confidence_threshold: 0.5   # [0.0, 1.0] — ngưỡng tin cậy, thấp = nhận nhiều text hơn nhưng dễ sai
  batch_size: 4               # [1, 32] — số frame xử lý cùng lúc (tăng = nhanh hơn, tốn RAM hơn)
  model_variant: mobile       # mobile = nhanh (mặc định) | server = chính xác hơn (~5-10x chậm hơn trên CPU)
  cpu_threads: 0              # 0 = tự động dùng tất cả cores | chỉ định số cụ thể nếu muốn giới hạn

# ============================================================================
# Theo dõi text (Tracker) — ghép các vùng text qua nhiều frame thành segment
# ============================================================================
tracker:
  iou_threshold: 0.5                  # [0.0, 1.0] — ngưỡng IoU để coi 2 box là cùng 1 text
  content_similarity_threshold: 0.7   # [0.0, 1.0] — ngưỡng tương đồng nội dung text
  center_distance_ratio: 0.10         # (0.0, 1.0] — khoảng cách tâm tối đa (tỷ lệ đường chéo frame)
  n_inactive: 3                       # [1, 30] — số frame không thấy text trước khi đóng segment
  max_active_segments: 100            # [1, 1000] — số segment tối đa theo dõi cùng lúc

  # --- Ổn định vị trí phụ đề (chống giật) ---
  #
  # Có 2 chế độ smoothing:
  #
  # A) One Euro Filter (MẶC ĐỊNH, khuyên dùng):
  #    Bộ lọc thích ứng — tự động mượt khi text tĩnh, bám nhanh khi text di chuyển/zoom.
  #    Không cần chỉnh smooth_lock_threshold hay smooth_ema_alpha khi bật One Euro.
  #
  #    Mẹo chỉnh:
  #      - Text tĩnh vẫn giật nhẹ?     → giảm min_cutoff xuống 0.1-0.2
  #      - Text di chuyển bị lag?       → tăng beta lên 0.7-1.0
  #      - Muốn cân bằng mượt + nhanh? → min_cutoff=0.3, beta=0.5 (mặc định)
  #
  # B) Lock + EMA (chế độ cũ):
  #    Dùng khi smooth_one_euro_enabled: false
  #    smooth_lock_threshold + smooth_ema_alpha sẽ được áp dụng.
  #
  smooth_one_euro_enabled: true        # true = dùng One Euro Filter; false = dùng Lock+EMA cũ
  smooth_one_euro_min_cutoff: 0.001    # [0.001, 10.0] — cutoff tối thiểu; nhỏ = mượt hơn (lọc noise mạnh)
  smooth_one_euro_beta: 0.004          # [0.0, 10.0] — hệ số tốc độ; nhỏ = mượt hơn khi di chuyển (ít rung)
  smooth_one_euro_d_cutoff: 0.1        # [0.001, 10.0] — cutoff cho đạo hàm; nhỏ = lọc noise tốc độ mạnh hơn

  # --- Fallback: Lock + EMA (chỉ dùng khi smooth_one_euro_enabled: false) ---
  smooth_lock_threshold: 3             # [0, 20] px — ngưỡng khóa vị trí
  smooth_ema_alpha: 0.35               # (0.0, 1.0] — tốc độ bám theo chuyển động thật

# ============================================================================
# Xóa text gốc (Inpainting) — tẩy chữ Trung trước khi vẽ chữ Việt
# ============================================================================
inpainter:
  algorithm: telea         # thuật toán: telea (nhanh, mặc định) | ns (Navier-Stokes, mượt hơn nhưng chậm)
  radius: 3                # [1, 20] — bán kính vùng lấp (lớn = lấp rộng hơn, dễ bị mờ)
  padding: 6               # [0, 20] — mở rộng vùng xóa thêm N px mỗi cạnh (tránh sót viền chữ)

# ============================================================================
# Dịch thuật
# ============================================================================
translator:
  backend: llm             # google = Google Translate (miễn phí) | llm = dùng LLM API (chất lượng cao hơn)
  timeout_seconds: 10.0    # (0, 60] — timeout cho mỗi request dịch (giây)
  max_chars: 5000          # [1, 10000] — số ký tự tối đa gửi trong 1 lần dịch
  max_retries: 3           # [0, 10] — số lần thử lại khi dịch thất bại
  llm:
    enabled: true
    # --- Cấu hình LLM API (OpenAI-compatible endpoint) ---
    #
    # base_url: URL của proxy/API endpoint (BẮT BUỘC)
    #   - 9Router local:  "http://localhost:20128/v1"
    #   - OpenRouter:     "https://openrouter.ai/api/v1"
    #   - Bất kỳ proxy OpenAI-compatible nào khác
    #
    # model: tên model hoặc tên combo trên proxy
    #   - 9Router: tên combo bạn đặt trong dashboard (ví dụ: "free", "fast", v.v.)
    #   - OpenRouter: "google/gemini-2.5-flash-lite", "anthropic/claude-3-haiku", v.v.
    #
    # api_key_env: tên biến môi trường chứa API key (đọc từ file .env)
    #   - 9Router: có thể dùng key bất kỳ (ví dụ: "sk-anything")
    #   - OpenRouter: key từ openrouter.ai
    #
    # Khi LLM API thất bại → tự động fallback sang Google Translate (miễn phí, không cần key)
    #
    base_url: "http://localhost:20128/v1"
    model: vip
    api_key_env: LLM_API_KEY
    max_chars_target: 0    # 0 = không giới hạn độ dài bản dịch; khác 0 = yêu cầu dịch ngắn hơn N ký tự
    rpm: 15                # giới hạn request/phút (tùy proxy, 9Router thường không giới hạn)
    timeout_seconds: 60.0  # timeout riêng cho LLM (giây) — LLM thường chậm hơn Google Translate
    batch_size: 50         # [1, 50] — số lượng text gộp trong 1 lần gọi API (tiết kiệm request)

# ============================================================================
# Hiển thị text tiếng Việt (Renderer)
# ============================================================================
renderer:
  font_path: fonts/NotoSans-Regular.ttf   # đường dẫn font chính
  font_size_max: 48        # [8, 512] — cỡ chữ tối đa (auto-fit sẽ chọn lớn nhất vừa box)
  font_size_min: 36        # [6, font_size_max] — cỡ chữ tối thiểu (nhỏ hơn = không render)
  text_rgb: [255, 255, 0]  # màu chữ [R, G, B] — vàng mặc định

  # --- Viền chữ (stroke) ---
  stroke_enabled: true     # bật/tắt viền
  stroke_rgb: [0, 0, 0]   # màu viền [R, G, B] — đen mặc định
  stroke_width: 2          # [0, 20] — độ dày viền (px)

  # --- Nền phía sau chữ (background) ---
  background_enabled: false      # bật/tắt nền
  background_rgb: [255, 255, 0]  # màu nền [R, G, B]
  background_alpha: 128          # [0, 255] — độ trong suốt; 255 = đặc hoàn toàn, 0 = trong suốt

  # --- Đổ bóng chữ (shadow) ---
  shadow_enabled: false    # bật/tắt bóng
  shadow_rgb: [0, 0, 0]   # màu bóng [R, G, B]
  shadow_offset: [2, 2]   # [dx, dy] mỗi giá trị trong [-50, 50] — độ lệch bóng so với chữ

  # --- Xử lý tràn (khi bản dịch tiếng Việt dài hơn box gốc) ---
  # Thứ tự áp dụng: 1) mở rộng box → 2) xuống dòng → 3) font hẹp
  overflow:
    expand_bbox_enabled: true              # cho phép mở rộng box
    expand_bbox_max: 2                   # [1.0, 4.0] — mở rộng tối đa N lần (dùng khi _w/_h không đặt)
    expand_bbox_max_w: 1.2                   # [0 hoặc 1.0-4.0] — mở rộng chiều NGANG riêng (0 = dùng expand_bbox_max)
    expand_bbox_max_h: 2                   # [0 hoặc 1.0-4.0] — mở rộng chiều DỌC riêng (0 = dùng expand_bbox_max)
    word_wrap_enabled: true                # cho phép xuống dòng
    word_wrap_max_lines: 3                 # [1, 10] — số dòng tối đa
    condensed_enabled: true                # cho phép dùng font hẹp (condensed)
    condensed_font_path: fonts/NotoSans-Condensed.ttf  # đường dẫn font hẹp

# ============================================================================
# Hiệu năng
# ============================================================================
performance:
  ocr_stride: 1                       # [1, 10] — chạy OCR mỗi N frame (10 = nhanh, 1 = chính xác nhất)
  ocr_downscale: 1                   # [1.0, 4.0] — thu nhỏ frame trước khi OCR (lớn = nhanh, mất chi tiết)
  io_buffer_frames: 8                  # số frame buffer khi đọc/ghi video
  max_duration_seconds: 7200           # giới hạn thời lượng video (giây) — mặc định 2 giờ
  max_file_size_bytes: 5368709120      # giới hạn dung lượng file (bytes) — mặc định 5 GB

  # --- Encoder (xuất video Pass2) ---
  # auto: tự phát hiện GPU encoder (nvenc > qsv > amf > libx264)
  # cpu: luôn dùng libx264 (chạy được mọi máy)
  # nvenc: NVIDIA GPU (GTX 600+)
  # qsv: Intel QuickSync (CPU Intel Gen 6+)
  # amf: AMD GPU
  encoder: auto
  encoder_preset: fast                 # ultrafast | fast | medium — nhanh hơn = file lớn hơn

  # --- Chế độ xử lý Pass2 ---
  # auto: tự chọn parallel nếu >= 4 cores, sequential nếu ít hơn
  # sequential: đơn luồng (an toàn, dùng ít RAM)
  # parallel: đa luồng (nhanh hơn 2-4x, tốn RAM hơn)
  pass2_mode: auto
  parallel_workers: 0                  # 0 = tự động (số cores - 2) | chỉ định cụ thể [1-32]
